# Primary cluster client auth (bind-mounted in docker-compose).
#
# Physical replication (pg_basebackup / walreceiver) uses the special database name
# "replication" and user "replicator". Those connections do NOT match DATABASE "all",
# so they never use the scram-sha-256 lines below — they must hit a "replication" row.
# If HBA blocks replication, the primary log shows:
#   no pg_hba.conf entry for replication connection from host "…", user "replicator", …
# "server closed the connection unexpectedly" is usually not HBA (primary restart/OOM/etc.).
#
# Tighten for production (CIDR, scram-sha-256 only, no trust on WAN).

local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
# Same L2/L3 subnet as the server (typical Docker Compose bridge peers):
host    replication     replicator      samenet                 trust
host    replication     replicator      0.0.0.0/0               trust
host    replication     replicator      ::/0                    trust
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
