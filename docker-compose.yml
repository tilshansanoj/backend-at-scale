services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVICE_NAME: "${SERVICE_NAME:-ecommerce-api}"
      APP_PORT: "8080"
      APP_ENV: "${APP_ENV:-local}"
      POSTGRES_URL: "postgres://postgres:postgres@postgres:5432/ecommerce?sslmode=disable"
      # Comma-separated read replicas; app round-robins. POSTGRES_READ_POOL_MAX_CONNS is split across each replica.
      POSTGRES_REPLICA_URL: "postgres://postgres:postgres@postgres-replica:5432/ecommerce?sslmode=disable,postgres://postgres:postgres@postgres-replica-2:5432/ecommerce?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-product-events}"
      KAFKA_GROUP_ID: "${KAFKA_GROUP_ID:-ecommerce-observability}"
      KAFKA_ASYNC_QUEUE_SIZE: "${KAFKA_ASYNC_QUEUE_SIZE:-16384}"
      KAFKA_ASYNC_WORKERS: "${KAFKA_ASYNC_WORKERS:-2}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4317}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      POSTGRES_POOL_MAX_CONNS: "${POSTGRES_POOL_MAX_CONNS:-25}"
      POSTGRES_READ_POOL_MAX_CONNS: "${POSTGRES_READ_POOL_MAX_CONNS:-60}"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=16
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-1200}
      - -c
      - superuser_reserved_connections=${POSTGRES_SUPERUSER_RESERVED:-10}
      - -c
      - idle_in_transaction_session_timeout=60s
      - -c
      - wal_keep_size=${POSTGRES_WAL_KEEP_SIZE:-2GB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/02-replication-user.sql:/docker-entrypoint-initdb.d/02-replication-user.sql:ro
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  postgres-replica:
    build:
      context: ./db
      dockerfile: Dockerfile.replica
    image: ecommerce-postgres-replica:local
    container_name: ecommerce-postgres-replica
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      REPLICATOR_PASSWORD: replicator_pass
      PGDATA: /var/lib/postgresql/data
      # Physical slot on primary so WAL is not recycled before this replica catches up (pair with wal_keep_size on primary).
      REPLICATION_SLOT_NAME: ecommerce_replica_1
    command:
      - postgres
      - -c
      - max_wal_senders=16
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-1200}
      - -c
      - superuser_reserved_connections=${POSTGRES_SUPERUSER_RESERVED:-10}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 600s
    restart: unless-stopped

  postgres-replica-2:
    build:
      context: ./db
      dockerfile: Dockerfile.replica
    image: ecommerce-postgres-replica:local
    container_name: ecommerce-postgres-replica-2
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5434:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      REPLICATOR_PASSWORD: replicator_pass
      PGDATA: /var/lib/postgresql/data
      REPLICATION_SLOT_NAME: ecommerce_replica_2
    command:
      - postgres
      - -c
      - max_wal_senders=16
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-1200}
      - -c
      - superuser_reserved_connections=${POSTGRES_SUPERUSER_RESERVED:-10}
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 600s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: ecommerce-tempo
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    restart: unless-stopped

  k6:
    image: grafana/k6:0.53.0
    container_name: ecommerce-k6
    profiles: ["loadtest"]
    volumes:
      - ./k6:/scripts:ro
    entrypoint: ["k6"]
    command: ["run", "/scripts/products-load.js"]
    depends_on:
      - app

volumes:
  postgres_data:
  postgres_replica_data:
  postgres_replica2_data:
  prometheus_data:
  grafana_data:
  tempo_data:
